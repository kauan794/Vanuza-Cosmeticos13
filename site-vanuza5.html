<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanuza Cosméticos | Loja Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#fff;
overflow-x:hidden;
}

/* TOPBAR */
.topbar{
background:#000;
color:#fff;
text-align:center;
padding:8px;
font-size:14px;
}

/* HEADER */
header{
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
box-shadow:0 2px 15px rgba(0,0,0,0.05);
position:sticky;
top:0;
z-index:1000;
}

.logo{
color:#d63384;
font-weight:800;
font-size:22px;
}

.menu{
display:flex;
gap:25px;
}

.menu a{
text-decoration:none;
color:#333;
font-weight:500;
transition:0.3s;
}

.menu a:hover{
color:#d63384;
}

.menu-toggle{
display:none;
font-size:26px;
cursor:pointer;
}

/* PESQUISA */
.pesquisa{
padding:20px 40px;
}

.pesquisa input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
}

/* PRODUTOS */
.produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
}

.card{
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card h3{
font-size:18px;
margin-bottom:5px;
}

.preco{
color:#d63384;
font-weight:700;
margin:8px 0;
}

.selo{
display:inline-block;
padding:5px 10px;
border-radius:8px;
font-size:12px;
color:#fff;
margin-bottom:5px;
}

.novidade{background:#28a745;}
.promocao{background:#d63384;}

.btn{
background:#000;
color:#fff;
padding:12px;
border:none;
width:100%;
cursor:pointer;
font-weight:600;
transition:0.3s;
border-radius:10px;
}

.btn:hover{
background:#d63384;
}

/* CARRINHO */
.cart-icon{
position:fixed;
bottom:20px;
right:20px;
background:#000;
color:#fff;
width:60px;
height:60px;
display:flex;
justify-content:center;
align-items:center;
border-radius:50%;
font-size:22px;
cursor:pointer;
z-index:999;
}

.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:#d63384;
color:#fff;
font-size:12px;
padding:4px 7px;
border-radius:50%;
}

.carrinho{
position:fixed;
right:0;
top:0;
width:380px;
max-width:100%;
height:100%;
background:#fff;
box-shadow:-5px 0 25px rgba(0,0,0,0.2);
padding:25px;
transform:translateX(100%);
transition:0.4s;
overflow:auto;
z-index:1000;
}

.carrinho.active{
transform:translateX(0);
}

/* ADMIN */
.admin-btn{
position:fixed;
top:15px;
left:15px;
font-size:22px;
cursor:pointer;
}

.admin-panel{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:15px;
width:95%;
max-width:400px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
z-index:2000;
}

.admin-panel input,
.admin-panel textarea,
.admin-panel select{
width:100%;
margin:6px 0;
padding:8px;
}

/* MOBILE */
@media(max-width:768px){

header{
padding:15px 20px;
}

.menu{
position:absolute;
top:70px;
right:0;
background:#fff;
flex-direction:column;
width:200px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
display:none;
}

.menu.active{
display:flex;
}

.menu-toggle{
display:block;
}

.pesquisa{
padding:15px;
}

.produtos{
padding:20px;
grid-template-columns:1fr;
gap:20px;
}

.card img{
height:220px;
}

.carrinho{
width:100%;
}
}
</style>
</head>

<body>

<div class="topbar">
✨ WhatsApp 34 9922-8026 | Vanuza Cosméticos Oficial ✨
</div>

<header>
<div class="logo">Vanuza Cosméticos</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<a href="#">Início</a>
<a href="#">Novidades</a>
<a href="#">Promoções</a>
</div>
</header>

<div class="pesquisa">
<input type="text" id="pesquisa" placeholder="🔎 Buscar produto..." onkeyup="filtrarProdutos()">
</div>

<section class="produtos" id="listaProdutos"></section>

<div class="cart-icon" onclick="toggleCarrinho()">
🛍️
<div class="cart-count" id="cartCount">0</div>
</div>

<div class="carrinho" id="carrinho">
<h2>Seu Carrinho</h2>
<div id="itensCarrinho"></div>
<button class="btn" onclick="finalizarCompra()">Finalizar no WhatsApp</button>
</div>

<div class="admin-btn" onclick="abrirAdmin()">💄</div>

<div class="admin-panel" id="adminPanel">
<h2>Painel Admin 👑</h2>
<input type="text" id="nome" placeholder="Nome do Produto">
<input type="text" id="preco" placeholder="Preço">
<input type="text" id="imagem" placeholder="URL da Imagem">
<textarea id="descricao" placeholder="Descrição"></textarea>

<select id="categoria">
<option value="normal">Produto Normal</option>
<option value="novidade">Novidade</option>
<option value="promocao">Promoção</option>
</select>

<button class="btn" onclick="adicionarProduto()">Adicionar</button>
<button class="btn" onclick="fecharAdmin()">Fechar</button>
</div>

<script>
let produtos=JSON.parse(localStorage.getItem("produtos"))||[];
let carrinho=[];

function salvar(){
localStorage.setItem("produtos",JSON.stringify(produtos));
}

function carregar(){
let area=document.getElementById("listaProdutos");
area.innerHTML="";
produtos.forEach((p)=>{
let selo="";
if(p.categoria=="novidade"){
selo="<span class='selo novidade'>NOVO</span>";
}
if(p.categoria=="promocao"){
selo="<span class='selo promocao'>PROMOÇÃO</span>";
}

area.innerHTML+=`
<div class="card">
<img src="${p.imagem}">
<div class="card-content">
${selo}
<h3>${p.nome}</h3>
<p>${p.descricao}</p>
<p class="preco">R$ ${p.preco}</p>
<button class="btn" onclick="addCarrinho('${p.nome}','${p.preco}')">Adicionar ao Carrinho</button>
</div>
</div>`;
});
}

function adicionarProduto(){
let novo={
nome:nome.value,
preco:preco.value,
imagem:imagem.value,
descricao:descricao.value,
categoria:categoria.value
};
produtos.push(novo);
salvar();
carregar();
alert("Produto adicionado!");
}

function filtrarProdutos(){
let termo=document.getElementById("pesquisa").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{
let nome=card.querySelector("h3").innerText.toLowerCase();
card.style.display=nome.includes(termo)?"block":"none";
});
}

function addCarrinho(nome,preco){
carrinho.push({nome,preco});
document.getElementById("cartCount").innerText=carrinho.length;
mostrarCarrinho();
toggleCarrinho();
}

function toggleCarrinho(){
document.getElementById("carrinho").classList.toggle("active");
}

function mostrarCarrinho(){
let lista=document.getElementById("itensCarrinho");
lista.innerHTML="";
let total=0;
carrinho.forEach(item=>{
total+=parseFloat(item.preco);
lista.innerHTML+=`<p>${item.nome} - R$ ${item.preco}</p>`;
});
lista.innerHTML+=`<hr><strong>Total: R$ ${total.toFixed(2)}</strong>`;
}

function finalizarCompra(){
if(carrinho.length==0){alert("Carrinho vazio!");return;}
let mensagem="Olá, quero comprar:%0A";
let total=0;
carrinho.forEach(item=>{
mensagem+=`- ${item.nome} (R$ ${item.preco})%0A`;
total+=parseFloat(item.preco);
});
mensagem+=`%0ATotal: R$ ${total.toFixed(2)}`;
window.open(`https://wa.me/553499228026?text=${mensagem}`);
}

function abrirAdmin(){
let senha=prompt("Digite a senha:");
if(senha==="1982"){
adminPanel.style.display="block";
}else{
alert("Senha incorreta!");
}
}

function fecharAdmin(){
adminPanel.style.display="none";
}

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

carregar();
</script>

</body>
</html>
